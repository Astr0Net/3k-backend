Create a user message and receive streamed assistant response
---
tags:
  - Message
summary: Create a user message and receive streamed assistant response
description: >
  Creates a new user message in the specified chat, optionally updates the chat
  title if it is still the default title, and returns a streamed Server-Sent
  Events (SSE) response containing the assistant reply.
security:
  - BearerAuth: []
consumes:
  - application/json
produces:
  - text/event-stream
parameters:
  - in: path
    name: chat_id
    type: integer
    required: true
    description: ID of the chat
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: "برای این آگهی شغلی چه مهارت‌هایی لازم دارم؟"
responses:
  200:
    description: Stream started successfully and assistant response is returned as SSE
    schema:
      type: string
      example: |
        event: message
        data: {"chunk":"سلام"}

        event: message
        data: {"chunk":"، حتما"}

        event: done
        data: {"message":"completed"}
  400:
    description: Content is required
    schema:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: content is required
        data:
          type: string
          nullable: true
  401:
    description: Missing or invalid JWT token
  404:
    description: Chat not found
    schema:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: chat not found
        data:
          type: string
          nullable: true
  500:
    description: Internal server error during streaming