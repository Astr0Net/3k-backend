Get all messages of a chat
---
tags:
  - Message
summary: Get all messages of a chat
description: Returns all messages for a chat that belongs to the authenticated user, ordered by creation time ascending.
security:
  - BearerAuth: []
parameters:
  - in: path
    name: chat_id
    type: integer
    required: true
    description: ID of the chat
responses:
  200:
    description: Messages retrieved successfully
    schema:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: ok
        data:
          type: object
          properties:
            chat:
              type: object
              properties:
                chat_id:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: Job Search Chat
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
            messages:
              type: array
              items:
                type: object
                properties:
                  message_id:
                    type: integer
                    example: 10
                  chat_id:
                    type: integer
                    example: 1
                  role:
                    type: string
                    example: user
                  content:
                    type: string
                    example: "سلام، برای این موقعیت شغلی چقدر مناسبم؟"
                  created_at:
                    type: string
                    format: date-time
  401:
    description: Missing or invalid JWT token
  404:
    description: Chat not found
    schema:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: chat not found
        data:
          type: string
          nullable: true
  500:
    description: Internal server error