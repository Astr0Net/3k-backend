Get single resume
---
tags:
  - Resume
summary: Get a specific resume by ID
description: Returns a single resume owned by the authenticated user.
security:
  - BearerAuth: []
parameters:
  - in: path
    name: resume_id
    type: integer
    required: true
    description: Resume ID
responses:
  200:
    description: Resume retrieved successfully
    schema:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            title:
              type: string
              example: "رزومه برنامه نویس بک اند"
            content:
              type: string
              example: "محتوای رزومه"
            created_at:
              type: string
              example: "2026-05-08T15:00:00"
            updated_at:
              type: string
              example: "2026-05-08T15:00:00"
  404:
    description: Resume not found
    schema:
      type: object
      properties:
        error:
          type: string
          example: "resume not found"
  401:
    description: Missing or invalid JWT token