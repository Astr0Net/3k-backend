Get users list with search
---
tags:
  - Admin
summary: Get all users with optional search (admin only)
security:
  - BearerAuth: []
parameters:
  - in: query
    name: q
    type: string
    required: false
    description: Search by username or email
  - in: query
    name: page
    type: integer
    required: false
    default: 1
  - in: query
    name: per_page
    type: integer
    required: false
    default: 20
responses:
  200:
    description: Users retrieved successfully
    schema:
      type: object
      properties:
        status:
          type: integer
          example: 200
        data:
          type: object
          properties:
            users:
              type: array
              items:
                type: object
            total:
              type: integer
            page:
              type: integer
            pages:
              type: integer
  401:
    description: Missing/invalid token
  403:
    description: Access denied