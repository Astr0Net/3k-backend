Delete job by admin
---
tags:
  - Admin
summary: Delete a job listing from database (admin only)
security:
  - BearerAuth: []
parameters:
  - in: path
    name: job_id
    type: integer
    required: true
    description: ID of the job to delete
responses:
  200:
    description: Job deleted successfully
  401:
    description: Missing/invalid token
  403:
    description: Access denied
  404:
    description: Job not found