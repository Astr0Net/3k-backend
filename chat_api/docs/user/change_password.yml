Change authenticated user's password.

---
tags:
  - Users
summary: Change user password
description: >
  Requires the current password and a new password.
  The new password must pass validation rules.

security:
  - BearerAuth: []

parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
        new_password:
          type: string

responses:
  200:
    description: Password changed successfully
  400:
    description: Validation error
  401:
    description: Current password incorrect
  404:
    description: User not found