Login user
---
tags:
  - Auth
summary: Authenticate user and return JWT tokens
consumes:
  - application/json
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          example: strongPassword123
responses:
  200:
    description: Login successful
    schema:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string
          example: login successful
        data:
          type: object
          properties:
            user:
              type: object
            access_token:
              type: string
            refresh_token:
              type: string
            token_type:
              type: string
              example: Bearer
  400:
    description: Username and password are required
  401:
    description: Invalid credentials